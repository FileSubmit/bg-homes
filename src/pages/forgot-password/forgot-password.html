<section class="mx-auto max-w-2xl px-4 py-16 sm:px-6 lg:px-8">
  <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200 sm:p-10">
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-emerald-600">Възстановяване на профил</p>
    <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-900">Забравена парола</h1>
    <p class="mt-3 text-slate-600">Ще изпратим линк за нова парола на имейла ви. Той ще отвори екрана за смяна на парола на този сайт.</p>
    <div data-forgot-message class="hidden"></div>
    <form data-forgot-form class="mt-8 space-y-5">
      <label class="block space-y-2">
        <span class="text-sm font-medium text-slate-700">Имейл адрес</span>
        <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </label>
      <button data-forgot-submit class="rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800" type="submit">Изпращане на линк</button>
    </form>
    <div class="mt-6 text-sm">
      <a class="font-medium text-slate-600 transition hover:text-slate-900" href="/login">Обратно към входа</a>
    </div>
  </div>
</section>
