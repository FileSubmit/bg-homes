<section class="mx-auto max-w-2xl px-3 py-13 px-sm-4 px-lg-9">
  <div class="rounded-3xl bg-white p-9 shadow-sm ring-1 ring-slate-200 p-sm-11">
    <p class="fs-sm fw-semibold text-uppercase tracking-widest-lg text-emerald-600">Сигурен достъп</p>
    <h1 class="mt-6 fs-3 fw-bold tracking-tight text-slate-900">Вход</h1>
    <p class="mt-6 text-slate-600">Влезте, за да управлявате запазените си обяви и профила си.</p>
    <div data-login-message class="d-none"></div>
    <form data-login-form class="mt-9 space-y-5">
      <label class="d-block">
        <span class="form-label fs-sm fw-medium text-slate-700">Имейл адрес</span>
        <input class="form-control auth-input rounded-5 border-slate-300 px-3 py-6" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </label>
      <label class="d-block">
        <span class="form-label fs-sm fw-medium text-slate-700">Парола</span>
        <input class="form-control auth-input rounded-5 border-slate-300 px-3 py-6" name="password" type="password" placeholder="Вашата парола" autocomplete="current-password" required />
      </label>
      <div data-hcaptcha></div>
      <button data-login-submit class="btn btn-primary rounded-pill px-4 py-6 fs-sm fw-semibold hover-bg-slate-800" type="submit">Влизане</button>
    </form>
    <div class="mt-4 d-flex flex-wrap align-items-center justify-content-between gap-6 fs-sm">
      <a class="fw-medium text-slate-600 transition hover-text-slate-900" href="/forgot-password">Забравена парола?</a>
      <a class="fw-medium text-emerald-700 transition hover-text-emerald-800" href="/register">Създаване на профил</a>
    </div>
  </div>
</section>
