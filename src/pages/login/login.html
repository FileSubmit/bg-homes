<section class="mx-auto max-w-2xl px-4 py-16 sm:px-6 lg:px-8">
  <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200 sm:p-10">
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-emerald-600">Secure access</p>
    <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-900">Login</h1>
    <p class="mt-3 text-slate-600">Sign in to manage your saved listings and profile.</p>
    <div data-login-message class="hidden"></div>
    <form data-login-form class="mt-8 space-y-5">
      <label class="block space-y-2">
        <span class="text-sm font-medium text-slate-700">Email address</span>
        <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </label>
      <label class="block space-y-2">
        <span class="text-sm font-medium text-slate-700">Password</span>
        <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="password" type="password" placeholder="Your password" autocomplete="current-password" required />
      </label>
      <button data-login-submit class="rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800" type="submit">Sign in</button>
    </form>
    <div class="mt-6 flex flex-wrap items-center justify-between gap-3 text-sm">
      <a class="font-medium text-slate-600 transition hover:text-slate-900" href="/forgot-password">Forgot password?</a>
      <a class="font-medium text-emerald-700 transition hover:text-emerald-800" href="/register">Create account</a>
    </div>
  </div>
</section>
