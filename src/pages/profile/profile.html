<section class="mx-auto max-w-5xl px-4 py-16 sm:px-6 lg:px-8">
  <p class="text-sm font-semibold uppercase tracking-[0.3em] text-emerald-600">Your account</p>
  <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">Profile</h1>

  <div class="mt-10 grid gap-8 lg:grid-cols-2">
    <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
      <h2 class="text-xl font-semibold text-slate-900">Personal details</h2>
      <div data-profile-message class="hidden"></div>
      <form data-profile-form class="mt-6 space-y-5" novalidate>
        <div class="grid gap-5 sm:grid-cols-2">
          <label class="block space-y-2">
            <span class="text-sm font-medium text-slate-700">First name <span class="text-rose-500">*</span></span>
            <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="firstName" type="text" maxlength="80" autocomplete="given-name" required />
          </label>
          <label class="block space-y-2">
            <span class="text-sm font-medium text-slate-700">Last name <span class="text-rose-500">*</span></span>
            <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="lastName" type="text" maxlength="80" autocomplete="family-name" required />
          </label>
        </div>
        <label class="block space-y-2">
          <span class="text-sm font-medium text-slate-700">Phone</span>
          <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="phone" type="tel" maxlength="30" autocomplete="tel" placeholder="+359 88 000 0000" />
        </label>
        <button data-profile-submit class="rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-60" type="submit">Save details</button>
      </form>
    </div>

    <div class="space-y-8">
      <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
        <h2 class="text-xl font-semibold text-slate-900">Email address</h2>
        <div data-email-message class="hidden"></div>
        <form data-email-form class="mt-6 space-y-5" novalidate>
          <label class="block space-y-2">
            <span class="text-sm font-medium text-slate-700">Email <span class="text-rose-500">*</span></span>
            <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="email" type="email" autocomplete="email" required />
          </label>
          <button data-email-submit class="rounded-full border border-slate-300 px-6 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-900 hover:text-slate-900 disabled:cursor-not-allowed disabled:opacity-60" type="submit">Update email</button>
        </form>
      </div>

      <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
        <h2 class="text-xl font-semibold text-slate-900">Password</h2>
        <div data-password-message class="hidden"></div>
        <form data-password-form class="mt-6 space-y-5" novalidate>
          <label class="block space-y-2">
            <span class="text-sm font-medium text-slate-700">New password <span class="text-rose-500">*</span></span>
            <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="password" type="password" minlength="8" autocomplete="new-password" required />
          </label>
          <label class="block space-y-2">
            <span class="text-sm font-medium text-slate-700">Confirm new password <span class="text-rose-500">*</span></span>
            <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
          </label>
          <button data-password-submit class="rounded-full border border-slate-300 px-6 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-900 hover:text-slate-900 disabled:cursor-not-allowed disabled:opacity-60" type="submit">Change password</button>
        </form>
      </div>
    </div>
  </div>

  <div class="mt-12">
    <div class="flex flex-wrap items-end justify-between gap-4">
      <div>
        <h2 class="text-2xl font-bold tracking-tight text-slate-900">My listings</h2>
        <p class="mt-2 text-slate-600">Edit, unpublish, or delete your property listings. Unpublished listings stay in your account but are hidden from other visitors.</p>
      </div>
      <a class="inline-flex rounded-full bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-800" href="/add-property">Add property</a>
    </div>
    <div data-listings-message class="hidden"></div>
    <div data-my-properties class="mt-8 space-y-4">
      <p class="text-slate-500">Loading your listings…</p>
    </div>
  </div>
</section>
