<section class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
  <div>
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-emerald-600">Вашият профил</p>
    <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">Профил</h1>
    <p class="mt-3 max-w-2xl text-slate-600">Управлявайте обявите и личните си данни на едно място.</p>
  </div>

  <div class="mt-8 grid gap-6 lg:grid-cols-[240px_1fr]">
    <nav class="flex gap-2 overflow-x-auto rounded-3xl bg-white p-2 shadow-sm ring-1 ring-slate-200 lg:sticky lg:top-24 lg:h-fit lg:flex-col lg:gap-1 lg:overflow-visible">
      <button type="button" data-tab-button="properties" class="flex shrink-0 items-center gap-2 rounded-2xl px-4 py-2.5 text-left text-sm font-semibold transition">
        Публикувани имоти
      </button>
      <button type="button" data-tab-button="account" class="flex shrink-0 items-center gap-2 rounded-2xl px-4 py-2.5 text-left text-sm font-semibold transition">
        Лични данни
      </button>
    </nav>

    <div class="min-w-0">
      <section data-tab-panel="properties">
        <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200 sm:p-8">
          <div class="flex flex-wrap items-end justify-between gap-4">
            <div>
              <h2 class="text-xl font-semibold text-slate-900">Публикувани имоти</h2>
              <p class="mt-2 text-slate-600">Редактирайте, скривайте или изтривайте обявите си. Скритите обяви остават в профила ви, но не се виждат от други посетители.</p>
            </div>
            <a class="inline-flex shrink-0 rounded-full bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-800" href="/add-property">Добави имот</a>
          </div>
          <div data-listings-message class="hidden"></div>
          <div data-my-properties class="mt-8 space-y-4">
            <p class="text-slate-500">Зареждане на вашите обяви…</p>
          </div>
        </div>
      </section>

      <section data-tab-panel="account" class="hidden space-y-8">
        <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
          <h2 class="text-xl font-semibold text-slate-900">Лични данни</h2>
          <div data-profile-message class="hidden"></div>
          <form data-profile-form class="mt-6 space-y-5" novalidate>
            <div class="grid gap-5 sm:grid-cols-2">
              <label class="block space-y-2">
                <span class="text-sm font-medium text-slate-700">Име <span class="text-rose-500">*</span></span>
                <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="firstName" type="text" maxlength="80" autocomplete="given-name" required />
              </label>
              <label class="block space-y-2">
                <span class="text-sm font-medium text-slate-700">Фамилия <span class="text-rose-500">*</span></span>
                <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="lastName" type="text" maxlength="80" autocomplete="family-name" required />
              </label>
            </div>
            <label class="block space-y-2">
              <span class="text-sm font-medium text-slate-700">Телефон</span>
              <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="phone" type="tel" maxlength="30" autocomplete="tel" placeholder="+359 88 000 0000" />
            </label>
            <button data-profile-submit class="rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-60" type="submit">Запазване на данните</button>
          </form>
        </div>

        <div class="grid gap-8 lg:grid-cols-2">
          <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
            <h2 class="text-xl font-semibold text-slate-900">Имейл адрес</h2>
            <div data-email-message class="hidden"></div>
            <form data-email-form class="mt-6 space-y-5" novalidate>
              <label class="block space-y-2">
                <span class="text-sm font-medium text-slate-700">Имейл <span class="text-rose-500">*</span></span>
                <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="email" type="email" autocomplete="email" required />
              </label>
              <button data-email-submit class="rounded-full border border-slate-300 px-6 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-900 hover:text-slate-900 disabled:cursor-not-allowed disabled:opacity-60" type="submit">Обновяване на имейла</button>
            </form>
          </div>

          <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
            <h2 class="text-xl font-semibold text-slate-900">Парола</h2>
            <div data-password-message class="hidden"></div>
            <form data-password-form class="mt-6 space-y-5" novalidate>
              <label class="block space-y-2">
                <span class="text-sm font-medium text-slate-700">Нова парола <span class="text-rose-500">*</span></span>
                <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="password" type="password" minlength="8" autocomplete="new-password" required />
              </label>
              <label class="block space-y-2">
                <span class="text-sm font-medium text-slate-700">Потвърдете новата парола <span class="text-rose-500">*</span></span>
                <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
              </label>
              <button data-password-submit class="rounded-full border border-slate-300 px-6 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-900 hover:text-slate-900 disabled:cursor-not-allowed disabled:opacity-60" type="submit">Смяна на паролата</button>
            </form>
          </div>
        </div>
      </section>
    </div>
  </div>
</section>
