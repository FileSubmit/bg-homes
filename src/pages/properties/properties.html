<section class="max-w-7xl mx-auto px-3 py-13 px-sm-4 px-lg-9">
  <div class="d-flex align-items-end justify-content-between gap-3">
    <div>
      <p class="fs-sm fw-semibold text-uppercase tracking-widest-lg text-emerald-600">Имоти</p>
      <h1 class="mt-6 fs-3 fw-bold tracking-tight text-slate-900 properties-title">Препоръчани обяви</h1>
    </div>
  </div>

  <form data-filters-form class="mt-9 rounded-3xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
    <div class="row g-3">
      <div class="col-12 col-sm-6">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Търсене по заглавие</label>
        <input type="text" name="q" placeholder="напр. просторен апартамент…" class="form-control rounded-4 border-slate-300 fs-sm text-slate-900" />
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Сделка</label>
        <select name="transaction_type" data-transaction-select class="form-select rounded-4 border-slate-300 fs-sm text-slate-900"></select>
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Вид имот</label>
        <select name="property_type" data-property-type-select class="form-select rounded-4 border-slate-300 fs-sm text-slate-900"></select>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Област</label>
        <select name="region" data-region-select class="form-select rounded-4 border-slate-300 fs-sm text-slate-900"></select>
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Град</label>
        <select name="city" data-city-select disabled class="form-select rounded-4 border-slate-300 fs-sm text-slate-900"></select>
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Квартал</label>
        <select name="neighborhood" data-neighborhood-select disabled class="form-select rounded-4 border-slate-300 fs-sm text-slate-900"></select>
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Конструкция</label>
        <select name="construction_type" data-construction-type-select class="form-select rounded-4 border-slate-300 fs-sm text-slate-900"></select>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Цена от (€)</label>
        <input type="number" min="0" step="1" name="min_price" class="form-control rounded-4 border-slate-300 fs-sm text-slate-900" />
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Цена до (€)</label>
        <input type="number" min="0" step="1" name="max_price" class="form-control rounded-4 border-slate-300 fs-sm text-slate-900" />
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Площ от (m²)</label>
        <input type="number" min="0" step="1" name="min_area" class="form-control rounded-4 border-slate-300 fs-sm text-slate-900" />
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Площ до (m²)</label>
        <input type="number" min="0" step="1" name="max_area" class="form-control rounded-4 border-slate-300 fs-sm text-slate-900" />
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Спални (мин.)</label>
        <input type="number" min="0" step="1" name="min_bedrooms" class="form-control rounded-4 border-slate-300 fs-sm text-slate-900" />
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Бани (мин.)</label>
        <input type="number" min="0" step="0.5" name="min_bathrooms" class="form-control rounded-4 border-slate-300 fs-sm text-slate-900" />
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Етаж от</label>
        <input type="number" min="-5" step="1" name="min_floor" class="form-control rounded-4 border-slate-300 fs-sm text-slate-900" />
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Етаж до</label>
        <input type="number" min="-5" step="1" name="max_floor" class="form-control rounded-4 border-slate-300 fs-sm text-slate-900" />
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Етап на строителство</label>
        <select name="construction_stage" data-construction-stage-select class="form-select rounded-4 border-slate-300 fs-sm text-slate-900"></select>
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Отопление</label>
        <select name="heating" data-heating-select class="form-select rounded-4 border-slate-300 fs-sm text-slate-900"></select>
      </div>
      <div class="col-12 col-sm-6 col-lg-3">
        <label class="form-label d-block fs-xs fw-semibold text-uppercase tracking-wide text-slate-500">Обзавеждане</label>
        <select name="furnishing" data-furnishing-select class="form-select rounded-4 border-slate-300 fs-sm text-slate-900"></select>
      </div>
    </div>

    <div class="mt-7 d-flex flex-wrap align-items-center gap-6">
      <button type="submit" class="btn rounded-pill bg-slate-900 px-7 py-18 fs-sm fw-semibold text-white transition hover-bg-slate-800">
        Приложи филтрите
      </button>
      <button type="button" data-filters-reset class="btn rounded-pill bg-slate-100 px-7 py-18 fs-sm fw-semibold text-slate-700 transition hover-bg-slate-200">
        Изчисти филтрите
      </button>
      <span data-filters-count class="fs-sm text-slate-500"></span>
    </div>
  </form>

  <div data-properties-grid class="mt-11 row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4"></div>
</section>
