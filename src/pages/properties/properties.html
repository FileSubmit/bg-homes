<section class="mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8">
  <div class="flex items-end justify-between gap-4">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.3em] text-emerald-600">Имоти</p>
      <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">Препоръчани обяви</h1>
    </div>
  </div>

  <form data-filters-form class="mt-8 rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      <div class="lg:col-span-2">
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Търсене по заглавие</label>
        <input type="text" name="q" placeholder="напр. просторен апартамент…" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" />
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Сделка</label>
        <select name="transaction_type" data-transaction-select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900"></select>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Вид имот</label>
        <select name="property_type" data-property-type-select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900"></select>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Област</label>
        <select name="region" data-region-select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900"></select>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Град</label>
        <select name="city" data-city-select disabled class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900 disabled:opacity-50"></select>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Квартал</label>
        <select name="neighborhood" data-neighborhood-select disabled class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900 disabled:opacity-50"></select>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Конструкция</label>
        <select name="construction_type" data-construction-type-select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900"></select>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Цена от (€)</label>
        <input type="number" min="0" step="1" name="min_price" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" />
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Цена до (€)</label>
        <input type="number" min="0" step="1" name="max_price" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" />
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Площ от (m²)</label>
        <input type="number" min="0" step="1" name="min_area" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" />
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Площ до (m²)</label>
        <input type="number" min="0" step="1" name="max_area" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Спални (мин.)</label>
        <input type="number" min="0" step="1" name="min_bedrooms" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" />
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Бани (мин.)</label>
        <input type="number" min="0" step="0.5" name="min_bathrooms" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" />
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Етаж от</label>
        <input type="number" min="-5" step="1" name="min_floor" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" />
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Етаж до</label>
        <input type="number" min="-5" step="1" name="max_floor" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Етап на строителство</label>
        <select name="construction_stage" data-construction-stage-select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900"></select>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Отопление</label>
        <select name="heating" data-heating-select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900"></select>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Обзавеждане</label>
        <select name="furnishing" data-furnishing-select class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900"></select>
      </div>
    </div>

    <div class="mt-5 flex flex-wrap items-center gap-3">
      <button type="submit" class="rounded-full bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-800">
        Приложи филтрите
      </button>
      <button type="button" data-filters-reset class="rounded-full bg-slate-100 px-5 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-200">
        Изчисти филтрите
      </button>
      <span data-filters-count class="text-sm text-slate-500"></span>
    </div>
  </form>

  <div data-properties-grid class="mt-10 grid gap-6 md:grid-cols-2 xl:grid-cols-3"></div>
</section>
