<section class="mx-auto max-w-2xl px-4 py-16 sm:px-6 lg:px-8">
  <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200 sm:p-10">
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-emerald-600">Започнете тук</p>
    <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-900">Регистрация</h1>
    <p class="mt-3 text-slate-600">Създайте профил, за да публикувате и запазвате имоти.</p>
    <div data-register-message class="hidden"></div>
    <form data-register-form class="mt-8 space-y-5">
      <label class="block space-y-2">
        <span class="text-sm font-medium text-slate-700">Пълно име</span>
        <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="fullName" type="text" placeholder="Вашето име" autocomplete="name" required />
      </label>
      <label class="block space-y-2">
        <span class="text-sm font-medium text-slate-700">Имейл адрес</span>
        <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </label>
      <label class="block space-y-2">
        <span class="text-sm font-medium text-slate-700">Парола</span>
        <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="password" type="password" placeholder="Създайте парола" autocomplete="new-password" minlength="8" required />
      </label>
      <label class="block space-y-2">
        <span class="text-sm font-medium text-slate-700">Потвърдете паролата</span>
        <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="confirmPassword" type="password" placeholder="Повторете паролата" autocomplete="new-password" minlength="8" required />
      </label>
      <div data-hcaptcha></div>
      <button data-register-submit class="rounded-full bg-emerald-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-emerald-500" type="submit">Създаване на профил</button>
    </form>
    <div class="mt-6 text-sm">
      <a class="font-medium text-slate-600 transition hover:text-slate-900" href="/login">Вече имате профил? Влезте</a>
    </div>
  </div>
</section>
