<section class="mx-auto max-w-2xl px-3 py-13 px-sm-4 px-lg-9">
  <div class="rounded-3xl bg-white p-9 shadow-sm ring-1 ring-slate-200 p-sm-11">
    <p class="fs-sm fw-semibold text-uppercase tracking-widest-lg text-emerald-600">Започнете тук</p>
    <h1 class="mt-6 fs-3 fw-bold tracking-tight text-slate-900">Регистрация</h1>
    <p class="mt-6 text-slate-600">Създайте профил, за да публикувате и запазвате имоти.</p>
    <div data-register-message class="d-none"></div>
    <form data-register-form class="mt-9 space-y-5">
      <label class="d-block">
        <span class="form-label fs-sm fw-medium text-slate-700">Пълно име</span>
        <input class="form-control auth-input rounded-5 border-slate-300 px-3 py-6" name="fullName" type="text" placeholder="Вашето име" autocomplete="name" required />
      </label>
      <label class="d-block">
        <span class="form-label fs-sm fw-medium text-slate-700">Имейл адрес</span>
        <input class="form-control auth-input rounded-5 border-slate-300 px-3 py-6" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </label>
      <label class="d-block">
        <span class="form-label fs-sm fw-medium text-slate-700">Парола</span>
        <input class="form-control auth-input rounded-5 border-slate-300 px-3 py-6" name="password" type="password" placeholder="Създайте парола" autocomplete="new-password" minlength="8" required />
      </label>
      <label class="d-block">
        <span class="form-label fs-sm fw-medium text-slate-700">Потвърдете паролата</span>
        <input class="form-control auth-input rounded-5 border-slate-300 px-3 py-6" name="confirmPassword" type="password" placeholder="Повторете паролата" autocomplete="new-password" minlength="8" required />
      </label>
      <div data-hcaptcha></div>
      <button data-register-submit class="btn btn-success rounded-pill px-4 py-6 fs-sm fw-semibold hover-bg-emerald-500" type="submit">Създаване на профил</button>
    </form>
    <div class="mt-4 fs-sm">
      <a class="fw-medium text-slate-600 transition hover-text-slate-900" href="/login">Вече имате профил? Влезте</a>
    </div>
  </div>
</section>
