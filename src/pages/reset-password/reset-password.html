<section class="mx-auto max-w-2xl px-4 py-16 sm:px-6 lg:px-8">
  <div class="rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200 sm:p-10">
    <p class="text-sm font-semibold uppercase tracking-[0.3em] text-emerald-600">Възстановяване на профил</p>
    <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-900">Нова парола</h1>
    <p class="mt-3 text-slate-600">Задайте нова парола за профила си.</p>
    <div data-reset-message class="hidden"></div>
    <form data-reset-form class="mt-8 space-y-5">
      <label class="block space-y-2">
        <span class="text-sm font-medium text-slate-700">Нова парола</span>
        <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="password" type="password" placeholder="Създайте нова парола" autocomplete="new-password" minlength="8" required />
      </label>
      <label class="block space-y-2">
        <span class="text-sm font-medium text-slate-700">Потвърдете паролата</span>
        <input class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900" name="confirmPassword" type="password" placeholder="Повторете новата парола" autocomplete="new-password" minlength="8" required />
      </label>
      <button data-reset-submit class="rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800" type="submit">Смяна на паролата</button>
    </form>
    <div class="mt-6 text-sm">
      <a class="font-medium text-slate-600 transition hover:text-slate-900" href="/login">Обратно към входа</a>
    </div>
  </div>
</section>
