<section class="mx-auto max-w-2xl px-3 py-13 px-sm-4 px-lg-9">
  <div class="rounded-3xl bg-white p-9 shadow-sm ring-1 ring-slate-200 p-sm-11">
    <p class="fs-sm fw-semibold text-uppercase tracking-widest-lg text-emerald-600">Възстановяване на профил</p>
    <h1 class="mt-6 fs-3 fw-bold tracking-tight text-slate-900">Нова парола</h1>
    <p class="mt-6 text-slate-600">Задайте нова парола за профила си.</p>
    <div data-reset-message class="d-none"></div>
    <form data-reset-form class="mt-9 space-y-5">
      <label class="d-block">
        <span class="form-label fs-sm fw-medium text-slate-700">Нова парола</span>
        <input class="form-control auth-input rounded-5 border-slate-300 px-3 py-6" name="password" type="password" placeholder="Създайте нова парола" autocomplete="new-password" minlength="8" required />
      </label>
      <label class="d-block">
        <span class="form-label fs-sm fw-medium text-slate-700">Потвърдете паролата</span>
        <input class="form-control auth-input rounded-5 border-slate-300 px-3 py-6" name="confirmPassword" type="password" placeholder="Повторете новата парола" autocomplete="new-password" minlength="8" required />
      </label>
      <button data-reset-submit class="btn btn-primary rounded-pill px-4 py-6 fs-sm fw-semibold hover-bg-slate-800" type="submit">Смяна на паролата</button>
    </form>
    <div class="mt-4 fs-sm">
      <a class="fw-medium text-slate-600 transition hover-text-slate-900" href="/login">Обратно към входа</a>
    </div>
  </div>
</section>
